# Development environment: `conda env create -f environment.yml` from repo root.
# OpenPathSampling is vendored under src/python/openpathsampling; Boltz stays a submodule.
# Activate: `conda activate genai-tps`
name: genai-tps
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
    # Pin numpy 2.x before editable installs (aligned with boltz + numba>=0.61.2).
    - "numpy>=2.0,<2.3"
    - -e ./boltz
    - -e .[boltz,dev]
    # Optional: cartoon PNGs from scripts/visualize_cofolding_trajectory.py --render-cartoon
    # - -e .[boltz,dev,viz]
