# Development environment for genai-tps.
#
# ══ SETUP INSTRUCTIONS ════════════════════════════════════════════════════════
#
# Step 1 — Create the environment (do this ONCE):
#
#   conda env create -f environment.yml
#   conda activate genai-tps
#
# Step 1b — Update an EXISTING env to match new conda pins (does NOT re-run pip;
# avoids ``conda env update`` torch breakage documented below):
#
#   conda activate genai-tps
#   conda install -c conda-forge -y \
#     "openmm>=8.4,<8.5" "openmm-plumed=2.1=*_3" "plumed>=2.9,<2.10" \
#     make autoconf automake libtool pkg-config cxx-compiler fftw zlib gsl
#
# Step 2 — PLUMED with OPES: build ONLY from git submodule ``./plumed2/`` (not from conda):
#
#   Conda installs ``plumed`` + ``openmm-plumed`` so the solver and ``pin_compatible``
#   metadata stay satisfied; conda-forge's ``plumed`` binary does NOT include the
#   ``opes`` module.  There is no conda-only line that compiles OPES during env create.
#   Step 2 runs ``./configure && make install`` in ``plumed2/`` into ``$CONDA_PREFIX``,
#   replacing ``libplumedKernel.so`` with your OPES-enabled build.
#
#   Pin the submodule to the same 2.9.x line as the ``plumed>=2.9,<2.10`` pin below.
#
#     git submodule update --init plumed2
#     git -C plumed2 checkout v2.9.2
#     bash scripts/build_plumed_opes.sh
#
#   Then ``conda deactivate && conda activate genai-tps`` so ``PLUMED_KERNEL`` is set
#   (activate.d hook installed by the script).  Skip on CI if you do not run PLUMED OPES-MD.
#
# Step 3 — Install PyTorch with the right CUDA wheel for YOUR driver:
#
#   Run `nvidia-smi` and check the "CUDA Version" line (top-right corner).
#   Then run ONE of the following:
#
#     Driver CUDA 12.x where x < 8  (driver < 550):
#       bash scripts/install_torch_cuda.sh cu121
#
#     Driver CUDA 12.8+ (driver >= 550):
#       bash scripts/install_torch_cuda.sh cu128
#
#     CPU-only machine (no GPU):
#       bash scripts/install_torch_cuda.sh cpu
#
# Step 4 — Re-activate so conda hooks fire (torch LD_LIBRARY_PATH + PLUMED_KERNEL):
#
#   conda deactivate && conda activate genai-tps
#
# ── PYTHONPATH ───────────────────────────────────────────────────────────────
# Do not ``export PYTHONPATH`` to import ``genai_tps``.  The pip block below installs
# the package editable into this env.  Campaign / atlas drivers that subprocess
# other ``scripts/*.py`` entries pass ``<repo>/src/python`` on the child environment
# automatically (``genai_tps.subprocess_support``), so nested tools work from a
# clean shell after ``conda activate`` alone.
#
# ── Why not put torch in this file? ──────────────────────────────────────────
# PyTorch CUDA wheels are driver-specific.  Baking one wheel index into the
# yml means it breaks on machines with a different driver.  The install script
# handles driver detection, CUDA library pinning, and the nvJitLink
# LD_LIBRARY_PATH hook automatically.
#
# ── DO NOT run `conda env update -f environment.yml` on an existing env ──────
# Conda will re-run the pip section, triggering partial torch reinstalls that
# leave compiled .so files from the old version mixed with Python files from
# the new one (corrupted env).  Use pip directly to fix individual packages.
# ══════════════════════════════════════════════════════════════════════════════
name: genai-tps
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip

  # ── OpenMM + PDBFixer (conda-forge preferred for CUDA plugin bundling) ───────
  # openmm from conda-forge bundles CUDA/OpenCL plugins and the force-field XML
  # files; pdbfixer from conda-forge handles missing-residue repair used by the
  # RMSD-to-local-minimum CV (scripts/compute_cv_rmsd.py, OpenMMLocalMinRMSD).
  #
  # numpy must be pinned here (in the conda section) so the solver selects
  # openmm builds from the conda-forge numpy 2.x migration era.
  # conda-forge openmm builds before that migration were compiled against
  # numpy 1.x (PyArrayDescr = 96 bytes).  Running those against numpy 2.x
  # (PyArrayDescr = 88 bytes) causes:
  #   ValueError: numpy.dtype size changed, Expected 96 from C header, got 88
  # Listing numpy here forces conda to pick only numpy-2.x-compatible openmm.
  - numpy>=2.0,<2.3
  # OpenMM 8.4.x + plumed 2.9.x: keep this triple compatible (solver can otherwise
  # pick a broken openmm-plumed build).  Match working installs, e.g.:
  #   conda install -c conda-forge "openmm>=8.4,<8.5" "openmm-plumed=2.1=*_3" "plumed>=2.9,<2.10"
  # Build *_3 is the known-good openmm-plumed 2.1 revision on conda-forge for this stack.
  - openmm>=8.4,<8.5
  - "openmm-plumed=2.1=*_3"
  # Conda ``plumed``: satisfies openmm-plumed; kernel lacks OPES until Step 2 overlay.
  - plumed>=2.9,<2.10
  # Toolchain + libs to compile ``./plumed2`` in Step 2 (not a conda-from-source PLUMED).
  - make
  - autoconf
  - automake
  - libtool
  - pkg-config
  - cxx-compiler
  - fftw
  - zlib
  - gsl
  - pdbfixer>=1.9
  # NOTE: cuda-version is intentionally NOT pinned here.
  # Recent conda-forge openmm / openmm-plumed builds expect a cuda-version
  # virtual package (often 12.9+); pinning an older cuda-version can make the
  # solver fail.  Match the stack to your NVIDIA driver (see nvidia-smi).
  #
  # ── NVRTC override for driver 535 / CUDA 12.2 machines ───────────────────────
  # OpenMM generates CUDA kernels at runtime via NVRTC (not pre-compiled SASS
  # like PyTorch).  The conda-forge build ships cuda-nvrtc 12.9.86, which emits
  # PTX 8.9.  Driver 535 (CUDA 12.2) can only JIT PTX up to ~8.2, causing:
  #   CUDA_ERROR_UNSUPPORTED_PTX_VERSION (222)
  # Fix applied to this env (do once after env creation on driver-535 machines):
  #   pip install "nvidia-cuda-nvrtc-cu12==12.2.140"
  #   cp $CONDA_PREFIX/lib/python3.11/site-packages/nvidia/cuda_nvrtc/lib/libnvrtc.so.12 \
  #      $CONDA_PREFIX/lib/libnvrtc.so.12.2.140
  #   cp $CONDA_PREFIX/lib/python3.11/site-packages/nvidia/cuda_nvrtc/lib/libnvrtc-builtins.so.12.2 \
  #      $CONDA_PREFIX/lib/libnvrtc-builtins.so.12.2
  #   ln -sf $CONDA_PREFIX/lib/libnvrtc.so.12.2.140 $CONDA_PREFIX/lib/libnvrtc.so.12
  # The RPATH in libOpenMMCUDA.so is $ORIGIN/.. ($CONDA_PREFIX/lib/), so
  # redirecting the libnvrtc.so.12 symlink there is sufficient.
  # Verify with: python -m openmm.testInstallation (CUDA should pass)
  #
  # ── OpenMM quick check (after: conda activate genai-tps) ─────────────────────
  # Import (use -c; `python "import openmm"` wrongly treats that as a filename):
  #   python -c "import openmm; print(openmm.__version__); print(openmm.Platform.getPluginLoadFailures())"
  # PLUMED plugin (real OPES-MD); OPES requires Step 2 overlay (module opes on):
  #   grep '^module opes' "$CONDA_PREFIX/lib/plumed/src/config/config.txt"
  #   python -c "from openmmplumed import PlumedForce; print(PlumedForce)"
  # Non-empty getPluginLoadFailures() often lists HIP plugins missing libhiprtc
  # on NVIDIA-only machines — safe to ignore if CUDA/OpenCL/CPU work.
  # Driver / GPU cap:
  #   nvidia-smi
  # CUDA runtime check (should print energy if NVRTC override is in place):
  #   python -c "from openmm import openmm as mm, unit as u; p=mm.Platform.getPlatformByName('CUDA'); s=mm.System(); s.addParticle(1.0); c=mm.Context(s,mm.VerletIntegrator(1*u.femtoseconds),p); c.setPositions([[0,0,0]]*u.nanometer); print(c.getState(getEnergy=True).getPotentialEnergy())"
  # If you still see CUDA_ERROR_UNSUPPORTED_PTX_VERSION (222): repeat the
  # NVRTC override steps above; conda update may have restored the 12.9 symlink.
  # If you see "No compatible CUDA device": free VRAM or stop other GPU
  # processes (e.g. Boltz inference holds ~7 GiB, blocking a second CUDA client).
  # OpenCL clCreateContext (-6) has the same root cause (GPU busy).

  # ── Additional force-field parameters (AMBER14, explicit TIP3P / PME) ───────
  # openmmforcefields provides AMBER14 + GAFF2 + SMIRNOFF templates used by
  # compute_cv_rmsd.minimize_pdb (amber14-all.xml, amber14/tip3p.xml).
  - openmmforcefields>=0.14
  # OpenFF Toolkit: OpenFF Molecule / protonation paths for GAFF2 ligands in compute_cv_rmsd.
  - openff-toolkit>=0.14.0
  # ProDy: scripts/analyze_terminal_ensemble_prody.py, genai_tps.evaluation.terminal_ensemble_prody
  - prody>=2.4
  # PyMOL: scripts/visualize_cofolding_trajectory.py --render-cartoon (ribbon cartoons)
  - pymol-open-source>=2.5

  - pip:
    # ── Version anchors pinned BEFORE editable installs ──────────────────────
    # numpy: pinned in the conda section above so the solver picks openmm builds
    #        with numpy 2.x ABI.  Repeated here so pip also enforces the cap and
    #        prevents jax or other packages from upgrading to 2.4.x.
    - "numpy>=2.0,<2.3"
    - "pandas>=2.2.2"
    - "scipy==1.13.1"

    # ── torch is NOT listed here — it is driver-specific ─────────────────────
    # Run `bash scripts/install_torch_cuda.sh` after env creation (see above).
    # --compile-model: Triton JIT needs cuda.h. BoltzSamplerCore prepends
    # CUDA_HOME/include or /usr/local/cuda/include to CPATH when found; otherwise
    # `conda install -n genai-tps -c nvidia cuda-toolkit` (or set CUDA_HOME).
    # Reason: jax[cuda12] pulls in nvidia CUDA 12.9 packages (nvjitlink 12.9,
    # nccl 2.29, cublas 12.9, etc.) that conflict with torch cu121's CUDA 12.1
    # packages, causing cascading undefined-symbol ImportErrors.  Using
    # jax[cpu] keeps the nvidia package set solely under torch's control.
    - -e ./boltz
    # sampling extra pulls pymbar + openmmforcefields + openff-toolkit on pip; conda
    # already provides openmm, pdbfixer, openmmforcefields, openff-toolkit, prody, pymol.
    - -e .[boltz,dev,sampling,analysis]

    # ── torchmetrics: required by pytorch-lightning==2.5.0 ───────────────────
    # Listed explicitly so it survives cleanup operations that rm -rf torch*
    # (the precise glob in install_torch_cuda.sh spares torchmetrics dist-info,
    # but belt-and-suspenders here ensures it is always present).
    - "torchmetrics>=1.0"

    # ── JAX for GPU-accelerated MBAR (pymbar auto-detects jax) ───────────────
    # Use jax[cpu] — pymbar MBAR computation does not require a GPU.
    # jax[cuda12] would install nvidia CUDA 12.9 packages that fight with
    # torch cu121 (nvjitlink version cascade).  Upgrade to jax[cuda12] only
    # on a machine where torch and jax use matching CUDA versions.
    - "jax[cpu]>=0.4"
    # PoseBusters: ligand pose quality CVs for OPES (--bias-cv posebusters_*).
    - "posebusters==0.6.5"
    # Pip-only full stack (PyMOL + ProDy + OpenMM ligands): pip install -e ".[boltz,dev,full]"
